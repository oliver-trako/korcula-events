name: Event ingestion

on:
  workflow_dispatch:
    inputs:
      priority:
        description: Source priority to check
        required: false
        default: high
      limit:
        description: Maximum source URL entries to process, 0 for unlimited
        required: false
        default: "0"
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install OCR dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-hrv

      - name: Run ingestion pipeline
        shell: pwsh
        run: |
          $priority = "${{ github.event.inputs.priority }}"
          if (-not $priority) { $priority = "high" }
          $limit = "${{ github.event.inputs.limit }}"
          if (-not $limit) { $limit = "0" }
          ./scripts/run-ingestion-pipeline.ps1 -Priority $priority -Limit ([int]$limit)

      - name: Build social source report
        shell: pwsh
        run: |
          $priority = "${{ github.event.inputs.priority }}"
          if (-not $priority) { $priority = "high" }
          ./scripts/build-social-source-report.ps1 -Priority $priority -IncludeSearchLeads

      - name: Run poster OCR
        shell: pwsh
        run: ./scripts/ocr-posters.ps1 -CreateCandidates

      - name: Summarize ingestion results
        id: summary
        shell: pwsh
        run: |
          $branchName = "automation/event-ingestion"
          $reviewUrl = "https://korcula-events.com/review.html?ref=$([uri]::EscapeDataString($branchName))"
          $pending = Get-Content -Raw site/data/pending-events.json | ConvertFrom-Json
          $sourceReport = Get-Content -Raw site/data/source-check-report.json | ConvertFrom-Json
          $socialReport = Get-Content -Raw site/data/social-source-report.json | ConvertFrom-Json
          $posterReport = Get-Content -Raw site/data/poster-ocr-report.json | ConvertFrom-Json
          $candidates = @($pending.candidates)
          $needsReview = @($candidates | Where-Object { $_.status -in @("new","needs-review") }).Count
          $autoApproved = @($candidates | Where-Object { $_.reviewMode -eq "auto-approved" }).Count
          $autoRejected = @($candidates | Where-Object { $_.reviewMode -eq "auto-rejected" }).Count
          $structured = @($candidates | Where-Object { $_.event }).Count
          $duplicates = @($candidates | Where-Object { $_.duplicateRisk -eq "high" }).Count
          $sourceErrors = @($sourceReport.rows | Where-Object { $_.status -eq "error" }).Count
          $socialLeads = @($socialReport.rows).Count
          $posterCandidates = @($posterReport.results | Where-Object { $_.candidateId }).Count
          $body = @"
          Automated event ingestion run.

          Protected review dashboard for this PR branch:
          $reviewUrl

          Files to review in this PR:
          - site/data/pending-events.json
          - site/data/events.json
          - site/data/source-check-report.json
          - site/data/social-source-report.json
          - site/data/poster-ocr-report.json

          Summary:
          - Needs review: $needsReview
          - Auto-approved: $autoApproved
          - Auto-rejected stale events: $autoRejected
          - Structured candidates: $structured
          - Possible duplicates flagged: $duplicates
          - Source errors: $sourceErrors
          - Social leads in watchlist: $socialLeads
          - Poster OCR candidates: $posterCandidates

          Auto-approved structured candidates may have been merged into events.json.
          Low-confidence social, OCR, duplicate-risk, and search candidates remain in pending-events.json for review.
          Social pages/groups are listed in social-source-report.json for manual review unless API access is configured.
          "@
          $body | Set-Content -Path "$env:RUNNER_TEMP/pr-body.md" -Encoding UTF8
          "needs_review=$needsReview" >> $env:GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/event-ingestion
          title: "Update event candidates and auto-approved events"
          commit-message: "Update event candidates and auto-approved events"
          body-path: ${{ runner.temp }}/pr-body.md
          labels: event-ingestion
          assignees: oliver-trako
